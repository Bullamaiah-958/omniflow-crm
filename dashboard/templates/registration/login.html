<!DOCTYPE html>
<html>
<head>
    <title>Omni-Flow Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { margin-top: 100px; max-width: 400px; }
        .card { border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container login-container">
        <div class="card shadow">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Omni-Flow CRM</h3>
                <p class="text-muted text-center">Super Admin Login</p>
                <hr>
                
                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Invalid username or password.
                        </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'password_reset' %}" class="text-decoration-none">Forgot Password?</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
